<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>LIZZAAR — muziek | bio | booking</title>
  <meta name="description" content="LIZZAAR — industrial metal. Muziek, video, foto’s, news en booking." />
  <link rel="stylesheet" href="styles.css" />
  <style>
    #intro-overlay { position: fixed; inset: 0; background:#000; display:flex; align-items:center; justify-content:center; z-index:9999; }
    #intro-overlay video { width:100%; height:100%; object-fit:cover; }
    #logo { display:none; position:fixed; top:20px; left:20px; z-index:9998; }
    #logo img { width:120px; height:auto; }
    #site-content { visibility:hidden; }
    .bg-layer { background-image: url('assets/logo.png'); background-size: cover; background-position: center; background-repeat: no-repeat; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; opacity: 0.08; }
  </style>
</head>
<script>
  const v = document.getElementById('hero');
  if (v) {
 v.muted = true;
 v.play().catch(err => console.log('Autoplay failed:', err));
 v.addEventListener('playing', () => v.removeAttribute('poster'));
  }
  </script>
  <body class="site-bg">
  <div class="bg-layer" aria-hidden="true"></div>

  <div id="intro-overlay" aria-hidden="false">
    <video id="hero" src="assets/Intro.mp4" poster="assets/cover.jpg" playsinline muted autoplay loop preload="auto" controls>
    </video>
  </div>

  <div id="logo" aria-hidden="true">
    <img src="assets/logo.png" alt="Lizzaar logo">
  </div>

  <a class="skip-link" href="#main">Spring naar content</a>

  <header class="site-header" role="banner" aria-label="Hoofdnavigatie">
    <button id="menuToggle" class="menu-toggle" aria-expanded="false" aria-controls="siteNav">Menu</button>
    <nav id="siteNav" class="site-nav" role="navigation" aria-label="Hoofdmenu">
      <ul>
        <li><a href="#hero">Home</a></li>
        <li><a href="#bio">Bio</a></li>
        <li><a href="#photos">Foto's</a></li>
        <li><a href="#videos">Video's</a></li>
        <li><a href="#music">Muziek</a></li>
        <li><a href="#news">News</a></li>
        <li><a href="#booking">Booking</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main id="site-content">
   <!-- =================== MUZIEK SECTIE =================== -->
<section id="music" class="section">
    <div class="container">
        <h2>Muziek</h2>
        <p class="section-lead">Hieronder kun je onze laatste nummers beluisteren.</p>

        <!-- Speler 1: Min Eigen Ding -->
        <div class="music-track">
            <h4>LIZZAAR - Min Eigen Ding</h4>
            <audio controls style="width: 100%;">
              <source src="assets/audio/MinEigenDing.mp3" type="audio/mpeg">
              Je browser ondersteunt de audiospeler niet.
            </audio>
        </div>

        <!-- Speler 2: WienAterDaGepeisd -->
        <div class="music-track">
            <h4>LIZZAAR - WienAterDaGepeisd</h4>
            <audio controls style="width: 100%;">
              <source src="assets/audio/WienAterDagepeisd.mp3" type="audio/mpeg">
              Je browser ondersteunt de audiospeler niet.
            </audio>
        </div>

    </div>
</section>
<!-- =================== EINDE MUZIEK SECTIE =================== --> 


  </main>

  <footer class="site-footer" role="contentinfo">
    <p>© <span id="year"></span> LIZZAAR — All rights reserved.</p>
    <a href="privacy.html">Privacy & Cookies</a>
  </footer>

  <script>
  (function(){
    // DEZE REGELS WAREN VERDWENEN - ze verbinden de code met de HTML
    const overlay = document.getElementById('intro-overlay');
    const video = document.getElementById('intro-video');
    const logo = document.getElementById('logo');
    const content = document.getElementById('site-content');

    // Deze functie verbergt de intro en toont de website
    function finish() {
      overlay.style.display = 'none';
      overlay.setAttribute('aria-hidden', 'true');
      logo.style.display = '';
      logo.setAttribute('aria-hidden', 'false');
      content.style.visibility = 'visible';
    }

    // Dit start de video en voert 'finish' uit als de video eindigt
    video.addEventListener('ended', finish);
    setTimeout(finish, 8500); // Extra timer voor de zekerheid
    video.play().catch(() => finish()); // Probeert af te spelen, als het mislukt, ga door

  })();

  // Dit update het jaartal in de footer
  document.getElementById('year').textContent = new Date().getFullYear();
  </script>

  <script src="main.js"></script>
</body>
</html>
