<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>LIZZAAR — muziek | bio | booking</title>
  <meta name="description" content="LIZZAAR — industrial metal. Muziek, video, foto’s, news en booking." />
  <link rel="stylesheet" href="styles.css" />
  <style>
    #intro-overlay { position: fixed; inset: 0; background:#000; display:flex; align-items:center; justify-content:center; z-index:9999; }
    #intro-overlay video { width:100%; height:100%; object-fit:cover; }
    #logo { display:none; position:fixed; top:20px; left:20px; z-index:9998; }
    #logo img { width:120px; height:auto; }
    #site-content { visibility:hidden; }
    .bg-layer { background-image: url('LIZZAAR logo.png'); background-size: cover; background-position: center; background-repeat: no-repeat; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; opacity: 0.08; }
  </style>
</head>

<body class="site-bg">
  <div class="bg-layer" aria-hidden="true"></div>

  <div id="intro-overlay" aria-hidden="false">
    <video id="hero" src="Intro.mp4" poster="assets/cover.jpg" playsinline muted autoplay preload="auto"></video>
  </div>

  <div id="logo" aria-hidden="true">
    <img src="LIZZAAR logo.png" alt="Lizzaar logo">
  </div>

  <a class="skip-link" href="#main">Spring naar content</a>

  <header class="site-header" role="banner" aria-label="Hoofdnavigatie">
    <button id="menuToggle" class="menu-toggle" aria-expanded="false" aria-controls="siteNav">Menu</button>
    <nav id="siteNav" class="site-nav" role="navigation" aria-label="Hoofdmenu">
      <ul>
        <li><a href="#hero">Home</a></li>
        <li><a href="#bio">Bio</a></li>
        <li><a href="#photos">Foto's</a></li>
        <li><a href="#videos">Video's</a></li>
        <li><a href="#music">Muziek</a></li>
        <li><a href="#news">News</a></li>
        <li><a href="#booking">Booking</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main id="site-content">
    <section id="music" class="section">
        <div class="container">
            <h2>Muziek</h2>
            <p class="section-lead">Hieronder kun je onze laatste nummers beluisteren.</p>
            <div class="music-track">
                <h4>LIZZAAR - Min Eigen Ding</h4>
                <audio controls style="width: 100%;">
                  <source src="assets/Audio/MinEigenDing.mp3" type="audio/mpeg">
                  Je browser ondersteunt de audiospeler niet.
                </audio>
            </div>
            <div class="music-track">
                <h4>LIZZAAR - WienAterDaGepeisd</h4>
                <audio controls style="width: 100%;">
                  <source src="assets/Audio/WienAterDagepeisd.mp3" type="audio/mpeg">
                  Je browser ondersteunt de audiospeler niet.
                </audio>
            </div>
        </div>
    </section>
  </main>

  <footer class="site-footer" role="contentinfo">
    <p>© <span id="year"></span> LIZZAAR — All rights reserved.</p>
    <a href="privacy.html">Privacy & Cookies</a>
  </footer>

  <!-- ENKEL DIT SCRIPT IS NODIG -->
  <script>
    (function(){
      const overlay = document.getElementById('intro-overlay');
      const video = document.getElementById('hero');
      const logo = document.getElementById('logo');
      const content = document.getElementById('site-content');

      function finish() {
        if (overlay) overlay.style.display = 'none';
        if (logo) logo.style.display = '';
        if (content) content.style.visibility = 'visible';
      }

      if (video) {
        video.addEventListener('ended', finish);
        setTimeout(finish, 8500); // Failsafe timer
        video.play().catch(() => finish());
      } else {
        finish(); // Als er geen video is, toon de site meteen
      }
    })();

    const yearEl = document.getElementById('year');
    if (yearEl) {
      yearEl.textContent = new Date().getFullYear();
    }
  </script>

</body>
</html>
